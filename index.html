<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title id="appTitle">Skull King Mobile Score</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrap">
    <!-- SETUP SCREEN (only when no game is running) -->
    <section id="setupScreen" class="card">
      <div class="row between">
        <h2 id="setupTitle">Players</h2>
        <button id="btnStart" class="btnAccent">Start game</button>
      </div>
      <div id="setupHint" class="small" style="margin-top:6px;">
        Add players, then start. Player order determines turn highlight.
      </div>

      <div class="row between" style="margin-top:10px;">
        <label id="languageLabel" for="languageSelect" class="small">Language</label>
        <select id="languageSelect"></select>
      </div>

      <div class="row" style="margin-top:10px;">
        <input id="playerName" type="text" placeholder="username" autocomplete="off" />
        <button id="btnAdd" class="btnAccent">Add</button>
      </div>
      <div id="recentPlayersWrap" class="recentPlayersWrap hidden">
        <div id="recentPlayersLabel" class="small">Recent players</div>
        <div id="recentPlayers" class="chips recentPlayers"></div>
      </div>
      <div class="row setupActionsRow">
        <button id="btnSetupHistory">See history</button>
        <button id="btnSetupStats">Player statistics</button>
      </div>

      <div id="chips" class="chips"></div>
    </section>

    <!-- GAME SCREEN -->
    <section id="gameScreen" class="hidden">
      <div class="card">
        <div class="toolbarRow">
          <div class="row" style="gap:8px;">
            <span class="pill"><span id="roundPillText">Round</span> <b id="roundLabel">1</b></span>
          </div>
          <div class="row actionRow">
            <button id="btnNewGame" class="btnDanger">New game</button>
            <button id="btnHistory">History</button>
            <button id="btnDone" class="btnAccent">Round done</button>
          </div>
        </div>

        <div id="entryList" class="entryList"></div>
      </div>
    </section>
  </div>

  <div id="historyModal" class="modalOverlay hidden" aria-hidden="true">
    <div class="modalPage">
      <div class="modalHead row between">
        <div>
          <h2 id="historyTitle">History</h2>
          <div class="small mono" id="leaderLine"></div>
        </div>
        <button id="btnCloseHistory">Close</button>
      </div>
      <div class="modalBody">
        <div id="historyTabs" class="histTabs" role="tablist" aria-label="History views">
          <button id="btnTabHistory" class="tabBtn active" role="tab" aria-selected="true" aria-controls="tabPanelHistory">History</button>
          <button id="btnTabGraph" class="tabBtn" role="tab" aria-selected="false" aria-controls="tabPanelGraph">Graph</button>
        </div>
        <div id="tabPanelHistory" class="tabPanel" role="tabpanel">
          <div class="histWrap">
            <table>
              <thead id="histHead"></thead>
              <tbody id="histBody"></tbody>
            </table>
          </div>
        </div>
        <div id="tabPanelGraph" class="tabPanel hidden" role="tabpanel">
          <div class="graphWrap">
            <canvas id="histGraphCanvas" aria-label="Score progression graph"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="archiveModal" class="modalOverlay hidden" aria-hidden="true">
    <div class="modalPage">
      <div class="modalHead row between">
        <div>
          <h2 id="archiveTitle">Game archive</h2>
          <div class="small mono" id="archiveSummaryLine"></div>
        </div>
        <button id="btnCloseArchive">Close</button>
      </div>
      <div class="modalBody">
        <div id="archiveTabs" class="histTabs" role="tablist" aria-label="Archive views">
          <button id="btnTabArchiveGames" class="tabBtn active" role="tab" aria-selected="true" aria-controls="tabPanelArchiveGames">Games</button>
          <button id="btnTabArchiveStats" class="tabBtn" role="tab" aria-selected="false" aria-controls="tabPanelArchiveStats">Player statistics</button>
        </div>
        <div id="tabPanelArchiveGames" class="tabPanel" role="tabpanel">
          <div id="archiveGamesList" class="archiveGamesList"></div>
        </div>
        <div id="tabPanelArchiveStats" class="tabPanel hidden" role="tabpanel">
          <div class="row between statsFilterRow">
            <label id="statsPlayerLabel" for="statsPlayerSelect" class="small">Player for details</label>
            <select id="statsPlayerSelect"></select>
          </div>
          <div class="histWrap">
            <table>
              <thead id="statsHead"></thead>
              <tbody id="statsBody"></tbody>
            </table>
          </div>
          <div class="statsCharts">
            <div class="statsChartCard">
              <canvas id="statsWinLossCanvas"></canvas>
            </div>
            <div class="statsChartCard">
              <canvas id="statsPointsCanvas"></canvas>
            </div>
            <div class="statsChartCard">
              <canvas id="statsTrendCanvas"></canvas>
            </div>
            <div class="statsChartCard">
              <canvas id="statsPositionCanvas"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
